name: Phase 0 verification

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bootstrap package lockfile when missing
        if: ${{ hashFiles('package-lock.json') == '' }}
        run: |
          npm install --package-lock-only
          echo "LOCKFILE_GENERATED=true" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

      - name: Commit generated lockfile
        if: ${{ github.event_name == 'push' && env.LOCKFILE_GENERATED == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Add lockfile and verify Phase 0"
          git push origin HEAD:${{ github.ref_name }}
